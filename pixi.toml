[workspace]
authors = ["Seedking"]
channels = ["conda-forge"]
name = "WatchThisAnime"
platforms = ["win-64"]
version = "0.1.0"

[tasks]
serve = "python -m src"
lint = "ruff check src/"
inspect = "DANGEROUSLY_OMIT_AUTH=true npx @modelcontextprotocol/inspector"
code = "code ."

[dependencies]
python = ">=3.14.5,<3.15"
mcp = ">=1.27.2,<2"
httpx = ">=0.28.1,<0.29"
sqlalchemy = ">=2.0"
nodejs = "*"
pytest = "*"
ruff = "*"